<h1>To-Do List App</h1>

<input
  type="text"
  [(ngModel)]="task"
  placeholder="Enter Task">

<button
  (click)="addTask()"
  [disabled]="task==''">
  Add Task
</button>

<hr>

<p>Total Tasks: {{ tasks.length }}</p>

<ul>
  <li *ngFor="let t of tasks; let i=index">
    {{ t }}
    <button (click)="deleteTask(i)">
      Delete
    </button>
  </li>
</ul>
